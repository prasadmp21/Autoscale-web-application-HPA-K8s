apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoscale-webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autoscale-webapp
  template:
    metadata:
      labels:
        app: autoscale-webapp
    spec:
      containers:
      - name: autoscale-webapp
        image: prasadmapari21/autoscale-webapp:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: autoscale-webapp-service
spec:
  selector:
    app: autoscale-webapp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: NodePort

